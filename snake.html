<!DOCTYPE html>
<html>
<head>
    <title>Змейка</title>
</head>
<body>
    <h1>Змейка</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div>Счёт: <span id="score">0</span></div>
    <script>
        // Получаем canvas и контекст для рисования
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Настройки игры
        const gridSize = 20; // Размер клетки
        const tileCount = canvas.width / gridSize;

        // Переменные игры
        let snake = [{ x: 10, y: 10 }]; // Начальная позиция змейки
        let food = { x: 5, y: 5 }; // Начальная позиция еды
        let dx = 0; // Направление по X
        let dy = 0; // Направление по Y
        let score = 0;
        let gameRunning = true;

        // Функция для генерации случайной позиции
        function getRandomPosition() {
            return {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        // Функция для проверки столкновения с самим собой
        function checkSelfCollision(head) {
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return true;
                }
            }
            return false;
        }

        // Функция обновления игры
        function update() {
            if (!gameRunning) return;

            // Двигаем змейку
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Проверка на столкновение со стеной
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Проверка на столкновение с собой
            if (checkSelfCollision(head)) {
                gameOver();
                return;
            }

            // Добавляем новую голову
            snake.unshift(head);

            // Проверяем, съела ли змейка еду
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = score;
                food = getRandomPosition();
            } else {
                // Удаляем хвост, если еда не съедена
                snake.pop();
            }
        }

        // Функция отрисовки
        function draw() {
            // Очищаем canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем змейку
            ctx.fillStyle = 'lime';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }

            // Рисуем еду
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // Функция завершения игры
        function gameOver() {
            gameRunning = false;
            alert('Игра окончена! Ваш счёт: ' + score);
        }

        // Обработчик клавиш
        document.addEventListener('keydown', function(e) {
            switch (e.key) {
                case 'ArrowUp':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Игровой цикл
        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100); // Скорость игры (меньше число — быстрее)
        }

        // Запуск игры
        gameLoop();
    </script>
</body>
</html>
